    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is 22K gold?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "22K gold is 91.67% pure gold mixed with 8.33% alloy metals. It's harder than 24K gold, more suitable for jewellery, and is the standard in India. All 22K jewellery should carry BIS hallmark certification guaranteeing purity."
          }
        },
        {
          "@type": "Question",
          "name": "Is hallmarked jewellery mandatory in India?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, hallmarking is mandatory for jewellery above 20 grams. The BIS hallmark certifies purity and provides legal protection and resale value."
          }
        },
        {
          "@type": "Question",
          "name": "What's the difference between 22K and 24K gold?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "22K is 91.67% pure and harder (better for jewellery); 24K is 99.99% pure but softer (better for investment). For daily-wear jewellery, 22K is standard in India."
          }
        },
        {
          "@type": "Question",
          "name": "How much gold does a bride need for a wedding?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An Indian bride typically wears 100-300 grams of gold jewellery, depending on region. North Indian brides average 150-200g; South Indian brides wear 200-300g."
          }
        },
        {
          "@type": "Question",
          "name": "How long does custom jewellery take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Custom jewellery typically takes 15-20 days depending on complexity. Bridal sets take 20-30 days. Rush orders available with 10-20% premium."
          }
        },
        {
          "@type": "Question",
          "name": "Do you buy back old jewellery?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. We buy hallmarked 22K jewellery at rates based on current gold price and weight. Appraisal takes 10-15 minutes; payment available same-day in cash or adjusted toward new purchases."
          }
        },
        {
          "@type": "Question",
          "name": "How is jewellery priced?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Price = (Gold Weight in grams × Current Gold Rate) + Making Charges. Making charges vary 10-20% based on design complexity."
          }
        },
        {
          "@type": "Question",
          "name": "Are diamonds certified?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "All diamonds above 0.5 carat come with GIA or IGI certification, laser-inscribed with unique ID. Certification guarantees authenticity and resale value."
          }
        }
      ]
    }
    </script>
